    function mulberry32(a) {
      return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    function generateSeed(str) {
      let h = 1779033703 ^ str.length;
      for(let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = h << 13 | h >>> 19;
      }
      return h;
    }

            }
          }, 10);
        }
        return () => clearInterval(timer);
      }, [gameState, gameplayReady, timeLeft]);

      // 當時間結束且在遊戲中，觸發自動結算
      useEffect(() => {
        if (gameState === 'playing' && gameplayReady && timeLeft <= 0) {
          submitWord(true);
        }
      }, [gameState, gameplayReady, timeLeft]);

      // 處理過場遮罩與閘門開啟動畫
      useEffect(() => {
        if (gameState === 'playing') {
          setShutterOpen(false);
          setGameplayReady(false);

          const openTimer = setTimeout(() => {
            setShutterOpen(true);
          }, 50);

          const readyTimer = setTimeout(() => {
            setGameplayReady(true);
          }, 850);

          return () => {
            clearTimeout(openTimer);
            clearTimeout(readyTimer);
          };
        } else {
          setShutterOpen(false);
          setGameplayReady(false);
        }
      }, [gameState]);

      // 生成回合資料
      const generateRound = () => {
        const seed = generateSeed(missionCode + "R" + round);
        const prng = mulberry32(seed);

        const vowels = ['A', 'E', 'I', 'O', 'U', 'Y'];
        const isVowel = (char) => vowels.includes(char);
        const isVC = (c1, c2) => (isVowel(c1) && !isVowel(c2)) || (!isVowel(c1) && isVowel(c2));

        const newCards = [];
        let vcCount = 0;

        for (let i = 0; i < 8; i++) {
          let topLetter = '';
          let bottomLetter = '';
          let topBugs = 1;
          let bottomBugs = 1;

          // 若後面剩下的卡牌全部抽 VC 也剛好湊滿 5 張，則接下來必須強迫抽到 VC
          const mustBeVC = (vcCount + (8 - i) === 5);

          while (true) {
            topLetter = LETTERS[Math.floor(prng() * LETTERS.length)];
            bottomLetter = LETTERS[Math.floor(prng() * LETTERS.length)];
            topBugs = Math.floor(prng() * 3) + 1;
            bottomBugs = Math.floor(prng() * 3) + 1;

            // 規則 1: 避免出現上下都是 S 的組合
            if (topLetter === 'S' && bottomLetter === 'S') {
              continue;
            }

            const isThisVC = isVC(topLetter, bottomLetter);

            // 規則 2: 若觸發強迫條件且此卡不是 VC 組合，則重新抽
            if (mustBeVC && !isThisVC) {
              continue;
            }

            if (isThisVC) {
              vcCount++;
            }
            break;
          }

          newCards.push({
            id: i,
            top: { letter: topLetter, bugs: topBugs },
            bottom: { letter: bottomLetter, bugs: bottomBugs }
          });
        }

        // 抽任務
        const missionPool = LOCALE[lang].missions;
        const selectedMissionIndex = Math.floor(prng() * missionPool.length);
        
        setCards(newCards);
        setMission(missionPool[selectedMissionIndex].id); // 存任務ID，渲染時依lang對應
        setTargetBugs(Math.floor(prng() * 8) + 6);
        setSelections([]);
        setIsValidated(false);
        setTimeLeft(10000);
        setGameState('playing');
      };

      const currentBugs = selections.reduce((sum, sel) => {
        const card = cards[sel.cardId];
        return sum + (card ? card[sel.side].bugs : 0);
      }, 0);

      const currentWord = selections
        .map(sel => cards[sel.cardId] ? cards[sel.cardId][sel.side].letter : '')
        .join('');

      const submitWord = (isTimeUp = false) => {
        const basePoints = currentWord.length;
        const bugPoints = currentBugs === targetBugs ? 2 : 0;
        const missionPoints = isValidated ? 3 : 0;
        const roundTotal = basePoints + bugPoints + missionPoints;

        setRoundReport({
          word: currentWord,
          base: basePoints,
          bugCount: currentBugs,
          bugBonus: bugPoints,
          missionBonus: missionPoints,
          total: roundTotal,
          isTimeUp: isTimeUp
        });
        setTotalScore(prev => prev + roundTotal);
        setGameState('round_end');
      };

                    >

                  </span>
                </div>

                <div className="flex justify-between items-center text-green-400 border-b border-green-900 pb-2">
                   <div className="flex flex-col items-start text-left">
                    <span>{t.ui.hqMission}</span>
                    <span className="text-xs text-gray-400 truncate max-w-[200px]">{currentMission.title}</span>
                  </div>
                  <span className={`font-bold ${roundReport.missionBonus > 0 ? 'text-amber-400' : 'text-gray-500'}`}>
                    +{roundReport.missionBonus}
                  </span>
                </div>

                <div className="flex justify-between items-center text-xl text-green-300 pt-2 font-bold">
                  <span>{t.ui.roundTotal}</span>
                  <span className="text-3xl text-green-500">+{roundReport.total}</span>
                </div>
              </div>

              <div className="pt-6">
                <button 
                  onClick={handleNextRound}
                  className="px-8 py-3 bg-green-700 hover:bg-green-500 text-black font-bold text-xl rounded shadow-[0_0_10px_rgba(34,197,94,0.6)] uppercase"
                >
                  {round >= 10 ? 'VIEW FINAL REPORT' : 'NEXT ROUND_'}
                </button>
              </div>
            </div>
          </ScreenContainer>
        );
      }

      if (gameState === 'game_over') {
        return (
          <ScreenContainer lang={lang} setLang={setLang}>
            <div className="flex-1 flex flex-col justify-center items-center text-center space-y-8 animate-terminal-boot p-4">
              <h1 className="text-4xl md:text-5xl font-bold tracking-widest text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]">
                {t.ui.gameOver}
              </h1>
              <p className="text-red-300/80 max-w-lg leading-relaxed">
                {t.ui.gameDesc}
              </p>
              
              <div className="bg-black/80 border-2 border-amber-500 p-8 rounded-sm shadow-[0_0_20px_rgba(245,158,11,0.3)] w-full max-w-sm">
                <h3 className="text-amber-600 mb-2 font-bold tracking-widest">{t.ui.finalScore}</h3>
                <div className="text-8xl font-bold text-amber-400 drop-shadow-[0_0_10px_rgba(245,158,11,0.8)]">
                  {totalScore}
                </div>
              </div>

              <button 
                onClick={() => {
                  setRound(1);
                  setTotalScore(0);
                  setMissionCode('');
                  setGameState('mission_select');
                }}
                className="px-8 py-3 border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-black transition-colors uppercase tracking-widest mt-8"
              >
                {t.ui.restart}
              </button>
            </div>
          </ScreenContainer>
        );
      }

      return null;
    }

    // Mount App component
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
